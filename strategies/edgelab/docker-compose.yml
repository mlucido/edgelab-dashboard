version: "3.8"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: always

  edgelab-core:
    build: .
    command: python main.py
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - NEWSAPI_KEY=${NEWSAPI_KEY:-}
      - KALSHI_API_KEY=${KALSHI_API_KEY:-}
      - THRESHOLD_PCT=${THRESHOLD_PCT:-90}
      - EDGELAB_DB_PATH=data/edgelab.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://edgelab-health:8502/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  edgelab-health:
    build: .
    command: python -m src.health.health_server
    ports:
      - "8502:8502"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - EDGELAB_DB_PATH=data/edgelab.db
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8502/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  edgelab-watchdog:
    build: .
    command: python -m src.watchdog.process_monitor
    depends_on:
      redis:
        condition: service_healthy
      edgelab-core:
        condition: service_started
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

  edgelab-dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.port=8501 --server.address=0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - REDIS_URL=redis://redis:6379
      - EDGELAB_DB_PATH=data/edgelab.db
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/_stcore/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    restart: always
    deploy:
      resources:
        limits:
          memory: 512M

volumes:
  redis-data:
